repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=5000"]

  - repo: local
    hooks:
      - id: block-runtime-files
        name: Block runtime/cache/db/media files
        entry: python3 scripts/block_files.py
        language: system
        pass_filenames: true
